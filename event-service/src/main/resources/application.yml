server:
  port: 8082

spring:
  application:
    name: event-service
  datasource:
    url: jdbc:mysql://localhost:3306/ticketing_event?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ticketing
    password: ticketing1234
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: event-service

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.ticketing: INFO
