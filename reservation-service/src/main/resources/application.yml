server:
  port: 8083

spring:
  application:
    name: reservation-service
  datasource:
    url: jdbc:mysql://localhost:3306/ticketing_reservation?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ticketing
    password: ticketing1234
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 3000
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092

redisson:
  address: redis://localhost:6379

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}

reservation:
  hold-minutes: 5

logging:
  level:
    com.ticketing: INFO
